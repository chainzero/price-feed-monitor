apiVersion: apps/v1
kind: Deployment
metadata:
  name: price-feed-monitor
  namespace: akash-services
  labels:
    app: price-feed-monitor
spec:
  # Single replica — running multiple instances would cause duplicate Slack alerts
  # since each instance maintains independent cooldown state in memory.
  replicas: 1
  selector:
    matchLabels:
      app: price-feed-monitor
  template:
    metadata:
      labels:
        app: price-feed-monitor
    spec:
      # No service account needed — this app makes only outbound HTTP calls.
      automountServiceAccountToken: false

      containers:
        - name: price-feed-monitor
          image: scarruthers/price-feed-monitor:v14
          imagePullPolicy: Always

          env:
            # Tell the app where to find the config file (mounted from ConfigMap below).
            - name: PRICE_FEED_MONITOR_CONFIG
              value: /etc/price-feed-monitor/config.yaml

            # Slack webhook URL — sourced from Secret, overrides the placeholder value
            # in config.yaml.
            - name: SLACK_WEBHOOK_URL
              valueFrom:
                secretKeyRef:
                  name: price-feed-monitor-secrets
                  key: slack-webhook-url

            # SendGrid API key — sourced from Secret. Optional: if absent, email
            # alerting is disabled even when email.enabled=true in the configmap.
            - name: SENDGRID_API_KEY
              valueFrom:
                secretKeyRef:
                  name: price-feed-monitor-secrets
                  key: sendgrid-api-key
                  optional: true

            # Etherscan API key — used to retrieve guardian set upgrade VAAs from
            # Ethereum transaction calldata when a guardian rotation is detected.
            # Optional: if absent, VAA retrieval falls back to Wormholescan.
            - name: ETHERSCAN_API_KEY
              valueFrom:
                secretKeyRef:
                  name: price-feed-monitor-secrets
                  key: etherscan-api-key
                  optional: true

          resources:
            requests:
              cpu: 100m
              memory: 64Mi
            limits:
              cpu: 1000m
              memory: 512Mi

          securityContext:
            # Match the distroless nonroot image's built-in user (uid/gid 65532).
            runAsNonRoot: true
            runAsUser: 65532
            runAsGroup: 65532
            # The binary only needs to read its config — no writes needed.
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            # NOTE: capabilities.drop ALL is intentionally omitted — on this k3s/Flannel
            # cluster it breaks UDP return traffic, preventing DNS resolution.

          volumeMounts:
            - name: config
              mountPath: /etc/price-feed-monitor
              readOnly: true

      volumes:
        - name: config
          configMap:
            name: price-feed-monitor-config

      # Restart on crash — K8s default for Deployments, stated explicitly for clarity.
      restartPolicy: Always
