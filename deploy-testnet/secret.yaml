# price-feed-monitor-testnet Secret
#
# Contains sensitive credentials that must NOT be committed to source control.
# This file is a template — replace the placeholder value before applying.
#
# To create the secret in the cluster:
#
#   # Option A: Apply this file after editing the value
#   kubectl apply -f deploy-testnet/secret.yaml
#
#   # Option B: Create directly from the command line (avoids storing value in a file)
#   kubectl create secret generic price-feed-monitor-testnet-secrets \
#     --namespace akash-services \
#     --from-literal=slack-webhook-url="https://hooks.slack.com/services/YOUR/REAL/WEBHOOK" \
#     --from-literal=etherscan-api-key="YOUR_ETHERSCAN_API_KEY"
#
# The SLACK_WEBHOOK_URL and ETHERSCAN_API_KEY env vars in the Deployment reference
# these secret keys. They override the placeholder values in the ConfigMap.
apiVersion: v1
kind: Secret
metadata:
  name: price-feed-monitor-testnet-secrets
  namespace: akash-services
type: Opaque
stringData:
  # Replace with the real Slack Incoming Webhook URL before applying.
  slack-webhook-url: "https://hooks.slack.com/services/YOUR/REAL/WEBHOOK"
  # Etherscan API key — used to retrieve guardian set upgrade VAAs from Ethereum
  # transaction calldata. Free tier is sufficient. Get one at https://etherscan.io/myapikey
  etherscan-api-key: "YOUR_ETHERSCAN_API_KEY"
